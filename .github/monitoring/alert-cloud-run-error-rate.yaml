displayName: "MUGA backend — Cloud Run 5xx rate > 5% (5m)"
documentation:
  content: |
    Production Cloud Run is returning 5xx errors at > 5% over the last 5
    minutes. See alerting runbook A2.
    https://github.com/<owner>/muga/blob/main/docs/api/alerting-runbook.md#a2
  mimeType: text/markdown
combiner: OR
enabled: true
conditions:
  - displayName: "5xx ratio > 5% for 5 min"
    conditionThreshold:
      filter: |
        resource.type = "cloud_run_revision"
        AND resource.labels.service_name = "muga-backend"
        AND metric.type = "run.googleapis.com/request_count"
        AND metric.labels.response_code_class = "5xx"
      aggregations:
        - alignmentPeriod: "60s"
          perSeriesAligner: ALIGN_RATE
          crossSeriesReducer: REDUCE_SUM
      comparison: COMPARISON_GT
      thresholdValue: 0.05
      duration: "300s"
      trigger:
        count: 1
notificationChannels:
  - "${NOTIFICATION_CHANNEL_PAGERDUTY_PROD}"
  - "${NOTIFICATION_CHANNEL_SLACK_PROD}"
alertStrategy:
  autoClose: "3600s"
severity: ERROR
