displayName: "MUGA backend — Cloud Run p95 latency > 1s (10m)"
documentation:
  content: |
    Cloud Run p95 request latency for muga-backend has exceeded 1s for the
    last 10 minutes. See alerting runbook A3.
  mimeType: text/markdown
combiner: OR
enabled: true
conditions:
  - displayName: "p95 latency > 1s for 10 min"
    conditionThreshold:
      filter: |
        resource.type = "cloud_run_revision"
        AND resource.labels.service_name = "muga-backend"
        AND metric.type = "run.googleapis.com/request_latencies"
      aggregations:
        - alignmentPeriod: "60s"
          perSeriesAligner: ALIGN_PERCENTILE_95
          crossSeriesReducer: REDUCE_MEAN
      comparison: COMPARISON_GT
      thresholdValue: 1000
      duration: "600s"
      trigger:
        count: 1
notificationChannels:
  - "${NOTIFICATION_CHANNEL_SLACK}"
alertStrategy:
  autoClose: "3600s"
severity: WARNING
