displayName: "MUGA backend /health uptime"
period: "60s"
timeout: "10s"
checkerType: STATIC_IP_CHECKERS
selectedRegions: ["EUROPE", "USA"]
httpCheck:
  requestMethod: GET
  path: /health
  port: 443
  useSsl: true
  validateSsl: true
  acceptedResponseStatusCodes:
    - statusClass: STATUS_CLASS_2XX
monitoredResource:
  type: uptime_url
  labels:
    project_id: ${PROJECT_ID} # muga-staging | muga-production
    host: ${BACKEND_HOST} # api.staging.muga.app | api.muga.app
contentMatchers:
  - content: '"status":"ok"'
    matcher: CONTAINS_STRING
