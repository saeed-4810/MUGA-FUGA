name: Deploy — Production

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.12.0"
  GCP_REGION: europe-west1
  GCP_PROJECT: muga-production
  GCP_PROJECT_NUMBER: "524228723694"
  ARTIFACT_REPO: muga
  SERVICE: muga-backend
  # PagerDuty Events API v2 endpoint. US region: events.pagerduty.com.
  # EU region: events.eu.pagerduty.com. Swap here based on your PD org region.
  PAGERDUTY_EVENTS_URL: "https://events.eu.pagerduty.com/v2/enqueue"
  # Firebase Web app config (public — domain-restricted by Firebase Auth).
  VITE_FIREBASE_API_KEY: AIzaSyA83pvqqaro-AbDGx-8eK0IVihJov9u1kI
  VITE_FIREBASE_AUTH_DOMAIN: muga-production.firebaseapp.com
  VITE_FIREBASE_PROJECT_ID: muga-production
  VITE_FIREBASE_APP_ID: "1:524228723694:web:f73b069f91784933d684ff"
  VITE_FIREBASE_STORAGE_BUCKET: muga-production-cover-art

jobs:
  # Gate: the tagged SHA must already have CI + docker green on main.
  # Since tags are cut from main, the CI run on that SHA will normally exist
  # before the tag is pushed. If not, this job polls for up to 15 minutes.
  wait-for-ci:
    name: Wait for CI + docker green
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - name: Wait for CI build check
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: build
          ref: ${{ github.sha }}
          timeoutSeconds: 900
          intervalSeconds: 15
      - name: Wait for CI docker check
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: docker
          ref: ${{ github.sha }}
          timeoutSeconds: 900
          intervalSeconds: 15

  deploy-frontend:
    name: Frontend → Firebase Hosting (production)
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://muga-production.web.app
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@${{ env.GCP_PROJECT }}.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Fetch Sentry DSN (frontend)
        id: secrets
        run: |
          echo "SENTRY_DSN=$(gcloud secrets versions access latest --secret=sentry-dsn-frontend --project=${{ env.GCP_PROJECT }})" >> $GITHUB_OUTPUT
      - name: Build frontend (production env)
        env:
          VITE_API_URL: https://muga-production.web.app/api
          VITE_FIREBASE_API_KEY: ${{ env.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ env.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ env.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ env.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_APP_ID: ${{ env.VITE_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN: ${{ steps.secrets.outputs.SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: pnpm --filter @muga/frontend build
      - name: Deploy Firebase (hosting + firestore + storage)
        run: |
          npx -y firebase-tools@latest deploy \
            --only hosting:app,firestore:rules,firestore:indexes,storage \
            --project ${{ env.GCP_PROJECT }} \
            --non-interactive

  deploy-backend:
    name: Backend → Cloud Run (production)
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@${{ env.GCP_PROJECT }}.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE }}:${{ github.ref_name }}"
          docker build -f apps/backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
      - name: Deploy to Cloud Run (with Secret Manager mounts)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --project=${{ env.GCP_PROJECT }} \
            --region=${{ env.GCP_REGION }} \
            --image="${IMAGE}" \
            --service-account=muga-backend@${{ env.GCP_PROJECT }}.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --port=8080 \
            --cpu=1 --memory=512Mi \
            --min-instances=1 --max-instances=20 \
            --set-env-vars="NODE_ENV=production,FIREBASE_PROJECT_ID=${{ env.GCP_PROJECT }},FIREBASE_STORAGE_BUCKET=muga-production-cover-art,SENTRY_ENVIRONMENT=production,CORS_ALLOWED_ORIGINS=https://muga-production.web.app,ALERT_READY_LATENCY_BUDGET_MS=1500" \
            --set-secrets="SENTRY_DSN=sentry-dsn-backend:latest,SLACK_WEBHOOK_URL=slack-webhook-url:latest,INITIAL_ADMIN_EMAILS=initial-admin-emails:latest,PAGERDUTY_INTEGRATION_KEY=pagerduty-integration-key:latest"

  smoke-production:
    name: Smoke test — production
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Wait + probe /health
        run: |
          # Cloud Run cold starts + Hosting CDN propagation can take up to 2
          # minutes after a fresh deploy. Poll /api/health up to 24×5s=120s.
          for i in $(seq 1 24); do
            if curl -fsSL "https://muga-production.web.app/api/health" | grep -q '"status":"ok"'; then
              echo "Production /api/health reports ok."
              break
            fi
            if [ "$i" = "24" ]; then
              echo "Production /api/health failed to respond ok within 120s."
              exit 1
            fi
            sleep 5
          done
      - name: Probe /api/openapi.json
        run: |
          curl -fsSL "https://muga-production.web.app/api/openapi.json" \
            | jq -e '.openapi | startswith("3.")' > /dev/null
      - name: Probe homepage returns 200 + MUGA brand
        run: |
          BODY=$(curl -fsSL "https://muga-production.web.app/")
          echo "$BODY" | grep -q "MUGA" || { echo "Homepage missing MUGA brand"; exit 1; }

  notify-on-failure:
    name: Alert — production deploy failure (page on-call)
    needs: [deploy-frontend, deploy-backend, smoke-production]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@${{ env.GCP_PROJECT }}.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Fetch alerting secrets
        id: alerts
        run: |
          SLACK=$(gcloud secrets versions access latest --secret=slack-webhook-url --project=${{ env.GCP_PROJECT }} 2>/dev/null || echo "")
          PD=$(gcloud secrets versions access latest --secret=pagerduty-integration-key --project=${{ env.GCP_PROJECT }} 2>/dev/null || echo "")
          if [ "$SLACK" = "PLACEHOLDER_REPLACE_ME" ] || [ -z "$SLACK" ]; then
            echo "slack_skip=true" >> $GITHUB_OUTPUT
          else
            echo "slack_webhook=$SLACK" >> $GITHUB_OUTPUT
            echo "slack_skip=false" >> $GITHUB_OUTPUT
          fi
          if [ "$PD" = "PLACEHOLDER_REPLACE_ME" ] || [ -z "$PD" ]; then
            echo "pd_skip=true" >> $GITHUB_OUTPUT
          else
            echo "pd_key=$PD" >> $GITHUB_OUTPUT
            echo "pd_skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Slack notify
        if: steps.alerts.outputs.slack_skip == 'false'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "attachments": [{
                "color": "#cc2030",
                "title": "[PAGE] CI deploy-production failed",
                "text": "Production deploy of ${{ github.ref_name }} failed. See run ${{ github.run_id }}.",
                "fields": [
                  { "title": "actor", "value": "${{ github.actor }}", "short": true },
                  { "title": "tag",   "value": "${{ github.ref_name }}", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ steps.alerts.outputs.slack_webhook }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      - name: PagerDuty trigger
        if: steps.alerts.outputs.pd_skip == 'false'
        env:
          PD_KEY: ${{ steps.alerts.outputs.pd_key }}
        run: |
          curl -fsSL -X POST "${{ env.PAGERDUTY_EVENTS_URL }}" \
            -H "content-type: application/json" \
            -d @- <<EOF
          {
            "routing_key": "${PD_KEY}",
            "event_action": "trigger",
            "payload": {
              "summary": "MUGA production deploy failed: ${{ github.ref_name }}",
              "severity": "critical",
              "source": "github-actions",
              "component": "deploy-production",
              "custom_details": {
                "run_id": "${{ github.run_id }}",
                "actor": "${{ github.actor }}"
              }
            }
          }
          EOF
