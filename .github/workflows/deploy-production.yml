name: Deploy — Production

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.12.0"
  GCP_REGION: europe-west1

jobs:
  deploy-frontend:
    name: Frontend → Firebase Hosting (production)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://muga.app
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml
      - name: Install
        working-directory: code
        run: pnpm install --frozen-lockfile
      - name: Build frontend (production env)
        working-directory: code
        env:
          VITE_API_URL: https://api.muga.app
          VITE_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: muga-production
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_APP_ID: ${{ secrets.PROD_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN: ${{ secrets.PROD_SENTRY_DSN_FRONTEND }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: pnpm --filter @muga/frontend build
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_PRODUCTION }}
      - name: Deploy hosting (production target)
        working-directory: code
        run: |
          npx -y firebase-tools@latest deploy \
            --only hosting:app,firestore:rules,firestore:indexes,storage \
            --project muga-production \
            --non-interactive

  deploy-backend:
    name: Backend → Cloud Run (production)
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_PRODUCTION }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push image
        working-directory: code
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/muga-production/muga/muga-backend:${{ github.ref_name }}"
          docker build -f apps/backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy muga-backend \
            --project muga-production \
            --region ${{ env.GCP_REGION }} \
            --image "${IMAGE}" \
            --allow-unauthenticated \
            --port 8080 \
            --cpu 1 --memory 512Mi \
            --min-instances 1 \
            --max-instances 20 \
            --set-env-vars NODE_ENV=production,FIREBASE_PROJECT_ID=muga-production,FIREBASE_STORAGE_BUCKET=muga-production.appspot.com,SENTRY_ENVIRONMENT=production,SENTRY_DSN=${{ secrets.PROD_SENTRY_DSN_BACKEND }},INITIAL_ADMIN_EMAILS=${{ secrets.PROD_INITIAL_ADMIN_EMAILS }},CORS_ALLOWED_ORIGINS=https://muga.app,SLACK_WEBHOOK_URL=${{ secrets.PROD_SLACK_WEBHOOK_URL }},PAGERDUTY_INTEGRATION_KEY=${{ secrets.PROD_PAGERDUTY_INTEGRATION_KEY }},ALERT_READY_LATENCY_BUDGET_MS=1500

  notify-on-failure:
    name: Alert — production deploy failure (page on-call)
    needs: [deploy-frontend, deploy-backend]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Slack notify
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "attachments": [{
                "color": "#cc2030",
                "title": "[PAGE] CI deploy-production failed",
                "text": "Production deploy of ${{ github.ref_name }} failed. See run ${{ github.run_id }}.",
                "fields": [
                  { "title": "actor", "value": "${{ github.actor }}", "short": true },
                  { "title": "tag",   "value": "${{ github.ref_name }}", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.PROD_SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      - name: PagerDuty trigger
        if: ${{ secrets.PROD_PAGERDUTY_INTEGRATION_KEY != '' }}
        run: |
          curl -fsSL -X POST "https://events.pagerduty.com/v2/enqueue" \
            -H "content-type: application/json" \
            -d @- <<EOF
          {
            "routing_key": "${{ secrets.PROD_PAGERDUTY_INTEGRATION_KEY }}",
            "event_action": "trigger",
            "payload": {
              "summary": "MUGA production deploy failed: ${{ github.ref_name }}",
              "severity": "critical",
              "source": "github-actions",
              "component": "deploy-production",
              "custom_details": {
                "run_id": "${{ github.run_id }}",
                "actor": "${{ github.actor }}"
              }
            }
          }
          EOF
