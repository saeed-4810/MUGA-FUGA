name: Preview — PR channel

# Gated on the `preview` label. A PR gets a preview deploy + E2E only when
# the `preview` label is present; otherwise this workflow skips entirely.
# Add the label → preview deploys. Remove the label → preview-cleanup.yml
# deletes the channel. See docs/INFRA_SETUP.md §Preview channels.
on:
  pull_request:
    types: [labeled, reopened, synchronize]
    branches: [main]

concurrency:
  # One preview build per PR. New pushes cancel the previous build.
  group: preview-pr-${{ github.event.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.12.0"
  GCP_PROJECT: muga-staging
  GCP_PROJECT_NUMBER: "438419642765"
  # Firebase Web app config (public — domain-restricted by Firebase Auth).
  # Previews use the staging project's web app and share the staging backend.
  VITE_FIREBASE_API_KEY: AIzaSyDXT-A5PCyAW39kK8LLNWeUKEaGeEWlrio
  VITE_FIREBASE_AUTH_DOMAIN: muga-staging.firebaseapp.com
  VITE_FIREBASE_PROJECT_ID: muga-staging
  VITE_FIREBASE_APP_ID: "1:438419642765:web:64ee9c4956469a129945c4"
  VITE_FIREBASE_STORAGE_BUCKET: muga-staging-cover-art

jobs:
  # Step 1 — Wait for CI on the same SHA to be green before we deploy
  # anything. If lint/typecheck/test/build failed, no preview is produced.
  # ALSO gated on the `preview` label: if a PR doesn't have the label, the
  # whole workflow skips.
  wait-for-ci:
    name: Wait for CI green
    if: contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - name: Wait for CI build check
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: build
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 900
          intervalSeconds: 15

  # Step 2 — Build the frontend with staging env + deploy to an isolated
  # Firebase Hosting preview channel tagged `pr-<number>`.
  preview-deploy:
    name: Deploy preview channel (Firebase Hosting)
    needs: wait-for-ci
    if: contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      channel_id: ${{ steps.deploy.outputs.channel_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@${{ env.GCP_PROJECT }}.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Fetch Sentry DSN (frontend)
        id: secrets
        run: |
          echo "SENTRY_DSN=$(gcloud secrets versions access latest --secret=sentry-dsn-frontend --project=${{ env.GCP_PROJECT }} 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
      - name: Build frontend (preview — staging env)
        env:
          # Previews hit the live staging backend via the firebase.json
          # `/api/**` rewrite, which is automatically applied by the channel
          # deploy (channel inherits the hosting config).
          VITE_API_URL: /api
          VITE_FIREBASE_API_KEY: ${{ env.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ env.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ env.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ env.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_APP_ID: ${{ env.VITE_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN: ${{ steps.secrets.outputs.SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: preview
          VITE_APP_VERSION: pr-${{ github.event.number }}-${{ github.sha }}
        run: pnpm --filter @muga/frontend build
      - name: Deploy to preview channel
        id: deploy
        run: |
          set -x
          set -o pipefail
          CHANNEL_ID="pr-${{ github.event.number }}"
          # --expires 7d auto-deletes the channel after a week if the PR
          # is still open. Closed PRs are explicitly cleaned by
          # preview-cleanup.yml.
          # Pipe through tee so both the log and a temp file get the output
          # (pipefail preserves firebase-tools' non-zero exit on failure).
          npx -y firebase-tools@latest hosting:channel:deploy "$CHANNEL_ID" \
            --project=${{ env.GCP_PROJECT }} \
            --only=app \
            --expires=7d \
            --json 2>&1 | tee /tmp/firebase-deploy.log
          # Extract the URL from the captured log.
          URL=$(grep -oE 'https://[a-z0-9-]+--[a-z0-9-]+\.web\.app' /tmp/firebase-deploy.log | head -1)
          if [ -z "$URL" ]; then
            echo "Failed to parse preview URL from firebase-tools output."
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "channel_id=$CHANNEL_ID" >> $GITHUB_OUTPUT

  # Step 3 — Run Playwright against the actual preview URL. This is the
  # *real* E2E — against the deployed frontend, hitting the shared staging
  # backend. If it fails, the PR status is red before the author requests
  # review.
  preview-e2e:
    name: Preview E2E (Playwright against preview URL)
    needs: preview-deploy
    if: contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.e2e.outcome }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: apps/frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Wait for preview URL to respond
        env:
          PREVIEW_URL: ${{ needs.preview-deploy.outputs.url }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsSL -o /dev/null "$PREVIEW_URL"; then
              echo "Preview is up at $PREVIEW_URL"
              exit 0
            fi
            echo "Attempt $i: preview not ready, sleeping 5s..."
            sleep 5
          done
          echo "Preview did not respond within 60s."
          exit 1
      - name: Run Playwright against preview
        id: e2e
        working-directory: apps/frontend
        env:
          E2E_BASE_URL: ${{ needs.preview-deploy.outputs.url }}
        run: pnpm e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-preview-pr-${{ github.event.number }}
          path: apps/frontend/playwright-report
          retention-days: 14

  # Step 4 — Post / update the PR comment with preview URL + E2E status.
  # Runs even if preview-e2e failed so the URL still gets posted.
  preview-comment:
    name: Post preview URL + E2E status
    needs: [preview-deploy, preview-e2e]
    if: always() && contains(github.event.pull_request.labels.*.name, 'preview') && needs.preview-deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post / update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const url        = `${{ needs.preview-deploy.outputs.url }}`;
            const channel    = `${{ needs.preview-deploy.outputs.channel_id }}`;
            const sha        = `${{ github.sha }}`.slice(0, 7);
            const e2eResult  = `${{ needs.preview-e2e.result }}`;
            const runId      = `${{ github.run_id }}`;
            const repo       = `${context.repo.owner}/${context.repo.repo}`;

            const e2eBadge = e2eResult === 'success'
              ? '✅ E2E passed'
              : e2eResult === 'skipped'
                ? '⏭ E2E skipped'
                : `❌ E2E failed — [open report](https://github.com/${repo}/actions/runs/${runId})`;

            const body = [
              `### 🚀 Preview deployed`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Preview** | ${url} |`,
              `| **Channel** | \`${channel}\` (expires in 7 days) |`,
              `| **Commit**  | \`${sha}\` |`,
              `| **Backend** | shared with \`muga-staging.web.app\` |`,
              `| **E2E**     | ${e2eBadge} |`,
              ``,
              `The preview hits the live staging backend via the \`/api/**\` rewrite.`,
            ].join("\n");

            // Replace previous bot comment if it exists so the PR thread stays tidy.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === "Bot" && c.body && c.body.startsWith("### 🚀 Preview deployed")
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
